# Etude review-gate tier definitions — the single machine-readable source of
# truth for L1/L2/L3/L4 panels. Two consumers read this file:
#   - a GATE (in the dev-workflow): runs the tier panel on a phase artifact and
#     CAPTURES the verdicts into the run via `etude capture-gate`.
#   - a REVIEW (the etude-review skill): runs the SAME tier panel ephemerally on
#     any artifact and does NOT capture.
#
# A seat is a MODEL/HARNESS identity that reviews the SAME shared prompt and
# votes GO/BLOCK. Seats are NEVER role personas (that is design-council, a
# different tool); divergence comes from model diversity, not assigned roles.
# Every tier requires a UNANIMOUS pass of its seats — none advances on partial
# approval. A seat failure (auth/quota/tool/empty/truncation) never counts as a
# pass and escalates per the degraded-gate policy in the runbook.

quorum: unanimous

# Tier numbers are inverted by weight: L1 is the heaviest, L4 the lightest.
tiers:
  L1:
    name: Full four-seat gate
    seats: [gemini, opus, codex]
    use: >-
      Heaviest; reserve for the riskiest L1 surfaces or when escalating: storage
      format / ref-namespace / git-plumbing changes that could lose or corrupt
      data, or break backward compatibility.
  L2:
    name: Strong three-seat gate
    seats: [opus, codex]
    use: >-
      The heavy-QA panel. Default for the PLAN and VERIFY phase gates and for any
      change touching product/CLI behavior, schema/format, refs/etude/*, or docs
      claiming NEW shipped behavior.
  L3:
    name: Medium two-seat gate
    seats: [opus, codex]
    use: >-
      The IMPLEMENT-phase gate, and low-risk localized refactors / validation
      tightening / test strengthening on an already-gated component.
  L4:
    name: Light single-seat gate
    seats: [opus]
    use: >-
      DOCS and FINAL REVIEW phase gates, and changes with no shipping-code change
      (test-only additions or docs/planning-only changes).

# Per-phase gate strength for the dev-workflow loop (escalate UP on risk).
# PLAN and VERIFY are the heavy-QA gates. Each entry also pins
# the ABSTRACTION LEVEL the gate prompt must tell seats to review at, so a plan
# gate does not spiral on implementation minutiae (push those to OPTIONAL / the
# implement+verify gates, where a failing test settles disputes objectively).
phase_gates:
  plan:
    tier: L2
    # Validated by bench (Variant B beat A 2/2 vs 1/2 on the Dolt-recovered
    # etude-2bm.1 plan rounds): this altitude cut the review-spiral — A over-blocked
    # a contract-correct plan on implementation minutiae; B passed it while still
    # catching the real behavior regression. Include this block verbatim in plan-gate prompts.
    abstraction: >-
      ABSTRACTION LEVEL: review at design/contract/behavior-preservation altitude —
      NOT implementation minutiae. BLOCK only if the plan (a) misses a requirement,
      (b) regresses or loosens an observable behavior/contract, or (c) specifies a
      mechanism that cannot be implemented as described. Anything that is an
      implementation detail a coder would naturally resolve, or that a test would
      catch, goes in OPTIONAL — do NOT block on it.
  implement: {tier: L3, abstraction: "code correctness against the approved plan"}
  verify:    {tier: L2, abstraction: "test adequacy + real built-binary behavior"}
  docs:      {tier: L4, abstraction: "docs match implemented behavior; docs policy"}
  review:    {tier: L4, abstraction: "bead-level readiness; diff vs plan"}

# Escalation OVERRIDES the chosen tier. If an L2/L3 target turns out to touch an
# L1 surface, or any seat finds it changes shipped behavior/schema/storage or
# could lose data, STOP and rerun at L1. Record the tier choice in the verdict.
escalation: >-
  If a target picked for L2/L3 touches an L1 surface, or any seat finds it
  changes shipped behavior/schema/storage or could lose/corrupt data, stop and
  rerun at L1.

# Seat identities + canonical non-interactive invocations. Each seat receives
# ONLY the shared gate prompt and the inlined artifact — never hidden context.
# `mode` captures the hard-won per-seat execution constraint (see the runbook
# "Per-seat execution constraints"): seats MUST NOT mutate the working tree.
seats:
  opus:
    provider: anthropic/claude-opus
    harness: claude-code
    invoke: "claude -p --model opus"        # prompt on stdin
    mode: inline                            # may mutation-test via a /tmp copy, NEVER the repo file
  codex:
    provider: openai/gpt-5.5
    harness: codex
    invoke: 'codex exec --ephemeral -m gpt-5.5 -c model_reasoning_effort="high" -s read-only -'  # prompt on stdin
    model_fallbacks: [gpt-5.4, gpt-5.3, gpt-5.2]
    mode: diff-only                         # review the diff ONLY; never go build/test/vet; keep input < ~700 lines
  gemini:
    provider: google/gemini-3.1-pro-preview
    harness: gemini-cli
    invoke: "env -u GOOGLE_CLOUD_PROJECT_ID -u GOOGLE_CLOUD_PROJECT -u CLOUDSDK_CORE_PROJECT gemini --skip-trust -m gemini-3.1-pro-preview -p"
    model_fallbacks: [gemini-3-pro-preview, gemini-3-flash-preview, gemini-2.5-pro]
    mode: inline-no-tools                   # inline the code; reason WITHOUT calling tools (its GrepTool bleeds across files)
